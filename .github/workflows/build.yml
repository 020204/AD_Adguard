name: Update Clash Rules

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'adguard.txt'
      - 'me.txt'
      - 'convert.sh'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Fix Script Format
        run: |
          sed -i 's/\r$//' convert.sh
          sed -i '1s|.*|#!/bin/bash|' convert.sh
          chmod +x convert.sh

      - name: Run Converter
        run: ./convert.sh

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 使用通配符添加所有 yaml 和日志文件，忽略不存在的错误
          git add *.yaml convert_log.txt 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 📅 自动更新规则集 ($(date +'%Y-%m-%d %H:%M'))"
            git push
          fi
